<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Login</title>
    <link rel="stylesheet" href="login.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
<div class="container" >
    <form >
        <h2>Login <a href="./index.html"><i class="fa-solid fa-house"></i></a> </h2>
        <input type="email" name="email" id="EMAIL" placeholder="Email" required> <br><br>
        <input type="text" name="name" id="username" placeholder="Username" required> <br><br>
        <input type="password" name="password" id="password" placeholder="Password" required> <br><br>
        <label><input type="checkbox">Remember me </label> <br><br>
        <a href="index.html"><button type="button" id="loginButton" >Login </button></a>
        <p>Don't have account?   <a href="Register.html"><i class="fa-solid fa-user-plus"></i>Register</a></p>
    </form>
</div>
<script>
    document.getElementById("loginButton").addEventListener("click", function() {
        let user_email = document.getElementById("EMAIL").value;
        let user_na = document.getElementById("username").value;
        localStorage.setItem("username", user_na);
        localStorage.setItem("useremail",user_email);
        window.location.href = "Profile.html";
    });
</script>
</body>
</html>
