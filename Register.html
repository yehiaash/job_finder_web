<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/html">
<head>
    <meta charset="UTF-8">
    <title>Register</title>
    <link rel="stylesheet" href="register.css">
</head>
<body>
<div class="container">
<form action="Login.html" onsubmit=" return register()" >
    <h1>Register</h1>
    <label >Email</label><br>
    <input type="email" name="email" id="email" placeholder="Email" required>
    <br>
    <label >Username</label><br>
    <input type="text" name="username" id="username" placeholder="Username" required><br><br>
    <div class="role">
        <label id="use"><input type="radio" name="role" id="USER" value="user" checked onclick="company(false)" >User</label>
        <label id="adm"><input type="radio" name="role" id="ADMIN" value="admin" onclick="company(true)"  >Admin</label>
    </div>
    <br>
    <div id="company" style="display:none;">
        <label>Company</label><br>
        <input type="text" id="companyField"  placeholder="Company Name"><br><br>
    </div>
    <label >Password</label><br>
    <input type="password" name="password" id="Password" placeholder="Password" required><br>

    <label >Confirm password</label><br>
    <input type="password" name="confirm_password" id="confirm_password" placeholder="Confirm Password" required> <br>
    <br>
    <button type="submit" id="registerButton" >Sign Up</button>
</form>
</div>
<script src="register.js"></script>
</body>
</html>
