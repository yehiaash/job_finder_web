<!DOCTYPE html>
<html>
    <head>
        <title>My Profile</title>
        <link rel="stylesheet" href="profiles.css">
        <script src="https://kit.fontawesome.com/057c30dfce.js" crossorigin="anonymous"></script>
    </head>
    <body>
        <header>
            <h1 class="title">CareerHub</h1>
            <nav >
                <a href="adminprofile.html"><i class="fa-solid fa-user"></i> Profile</a>
                <a href="View_list.html"><i class="fa-solid fa-house"></i> Home</a>
                <a href="Add_job.html"><i class="fa-solid fa-plus"></i> Add Job</a>
                <a href="Login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
                <a href="Register.html"><i class="fa-solid fa-person-circle-plus"></i> Register</a>
            </nav> 
        </header>
        <main id="adminmain">
                <div id="adminname">
                <label>Name</label><br><br>
                <input id="username" name="username" readonly>
                </div>
                <div id="adminemail">
                <label>Email</label><br><br>
                <input id="email" name="email" readonly>
                </div>
                <div id="compname">
                <label>Company name</label><br><br>
                <input id="compname" name="compname" readonly>
                </div>
                <div id="adminfield">
                <label>Field of expertise</label><br><br>
                <input id="job" name="job">
                </div>
                <div id="adminend">
                <label>Bio</label><br><br>
                <textarea rows="6" cols="50"> </textarea><br><br>
                <button>Save</button>
                </div>
                <script src="admin.js"></script>
        </main>
    </body>
</html>
