<!DOCTYPE html>
<html>
    <head>
        <title>Edit Job</title>
    </head>
    <body>
        <header>
            <h1>Position </h1>
            <nav align="end">
                <a href="adminprofile.html">Profile</a> ||
                <a href="View_list.html">Home</a> ||
                <a href="Add_job.html">Add job</a> ||
                <a href="Login.html">Login</a> ||
                <a href="Register.html">Register</a>
            </nav> 
        </header>
        <main>
            <section>
                <h3>Job description</h3>
                <textarea rows="6" cols="50"></textarea>
                <h3>Company name</h3>
                <input id="companyname" name="companyname">
                <h3>Location</h3>
                <input id="location" name="location">
                <h3>Job Type</h3>
                <input type="radio" id="Full-time" name="jobtype" value="Full-time">
                <label for="Full-time">Full-time</label><br>
                <input type="radio" id="Part-time" name="jobtype" value="Part-time">
                <label for="Part-time">Part-time</label><br>
                <input type="radio" id="Internship" name="jobtype" value="Internship">
                <label for="Internship">Internship</label>
                <h3>Salary</h3>
                <input type="number" min="1000" max="100000" step="1000"><br><br>
                <button>Edit</button> <button>Delete</button>
            </section>
        </main>
    </body>
</html>
