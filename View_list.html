<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Available Jobs</title>
    <link rel="stylesheet" href="style add job,view list.css">

    <!-- Font Awesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <nav>
        <h1>Available Jobs</h1>

        <div class="nav-links">
            <a href="adminprofile.html"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="View_list.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="Add_job.html"><i class="fa-solid fa-plus"></i> Add job</a>
            <a href="Login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
            <a href="Register.html"><i class="fa-solid fa-user-plus"></i> Register</a>
        </div>
    </nav>

   <table>
    <thead>
        <tr>
            <th>ID</th>
            <th>Job Title</th>
            <th>Salary</th>
            <th>Company</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
    </thead>

    <tbody id="jobTable">
    </tbody>
</table>

    <div class="btn-container">
        <a href="Add_job.html" class="add-btn">Add Job</a>
    </div>


    <script>
    let jobs=JSON.parse(localStorage.getItem("jobs"))||[];
    let table=document.getElementById("jobTable")
    function displayJobs() {
        table.innerHTML="";
        if (jobs.length===0) {
            table.innerHTML = "<tr><td colspan='5'>No Jobs Available</td></tr>";
        return;
        }

        jobs.forEach((job,index) => {
        let row = `
            <tr>
                <td>${index + 1}</td>
                <td>${job.title}</td>
                <td>${job.salary}</td>
                <td>${job.company}</td>
                <td>${job.status}</td>
                <td>
                        <button onclick="deleteJob(${index})" class="delete-btn">
                            Delete
                        </button>
                    </td>
            </tr>
       ` ;
        table.innerHTML += row;
    });

}
window.deleteJob=function(index){
    jobs.splice(index,1);
    localStorage.setItem("jobs",JSON.stringify(jobs));
    displayJobs();
}
displayJobs();

</script>

</body>
</html>
