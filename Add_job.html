<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add Job</title>
    <link rel="stylesheet" href="addandhome.css">

    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

    <nav>
        <h1>Add Job</h1>

        <div class="nav-links">
            <a href="adminprofile.html"><i class="fa-solid fa-user"></i> Profile</a>
            <a href="View_list.html"><i class="fa-solid fa-house"></i> Home</a>
            <a href="Add_job.html"><i class="fa-solid fa-plus"></i> Add job</a>
            <a href="Login.html"><i class="fa-solid fa-right-to-bracket"></i> Login</a>
            <a href="Register.html"><i class="fa-solid fa-user-plus"></i> Register</a>
        </div>
    </nav>

    <div class="form-container">
        <form>

            <label>Job Title</label>
            <input type="text" placeholder="Enter job title">

            <label>Salary</label>
            <input type="number" min="1000" step="1000" placeholder="Enter salary">

            <label>Company Name</label>
            <input type="text" placeholder="Enter company name">

            <label>Job Status</label>
            <select>
                <option>Open</option>
                <option>Closed</option>
            </select>

            <label>Job Type</label>
            <select>
                <option>Full-time</option>
                <option>Part-time</option>
                <option>Internship</option>
            </select>

            <label>Years of Experience</label>
            <input type="number" min="0" placeholder="Years of experience">

            <label>Job Description</label>
            <textarea placeholder="Write job description..."></textarea>
            

            <button type="submit">Add Job</button>

        </form>
    </div>



    <script>
document.querySelector("form").addEventListener("submit",function(e){ e.preventDefault();
    let title=document.querySelectorAll("input")[0].value;
    let salary=document.querySelectorAll("input")[1].value;
    let company=document.querySelectorAll("input")[2].value;
    let status=document.querySelector("select").value;
    let experience=document.querySelectorAll("input")[3].value;
    let description=document.querySelector("textarea").value;
    let job ={ 
        id:Date.now(),
        title,salary,company,status,experience,description
    };
    let jobs=JSON.parse(localStorage.getItem("jobs"))||[];
    jobs.push(job);
    localStorage.setItem("jobs",JSON.stringify(jobs));
    alert("Added Job Successfully ");
    document.querySelector("form").reset();

    }) ;

</script>
</body>
</html>
